<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pannelisation Taxi</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="shortcut icon" href="img/taxi.ico" type="image/x-icon">
</head>
<body>
  <img src="img/logo.webp" alt="LS Taxi Logo" class="logo">
  <div class="page-container">
    
    <section class="upload-row">
      <div class="upload-card">
        <h2>Panneau droite</h2>
        <label class="dropzone" for="input-x" id="dropzone-x">
          <span>Déposez l'image ici</span>
          <input type="file" id="input-x" accept="image/*" />
        </label>
        <div class="preview" id="preview-x"></div>
      </div>

      <div class="upload-card">
        <h2>Panneau gauche</h2>
        <label class="dropzone" for="input-y" id="dropzone-y">
          <span>Déposez l'image ici</span>
          <input type="file" id="input-y" accept="image/*" />
        </label>
        <div class="preview" id="preview-y"></div>
      </div>
    </section>

    <div class="actions">
      <button id="merge-btn">Panneliser</button>
      <button id="download-btn" class="secondary" disabled>Télécharger</button>
    </div>

    <section class="output-card">
      <h2>Résultat</h2>
      <div class="output-preview" id="output-preview">
        <span>Aucun résultat pour le moment</span>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
